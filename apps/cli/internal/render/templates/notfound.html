<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Not Found</title>
    <style>
        :root {
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'SF Mono', Monaco, 'Cascadia Code', 'Courier New', monospace;
            --color-text: #24292f;
            --color-text-secondary: #656d76;
            --color-link: #0969da;
            --color-bg: #ffffff;
            --color-bg-subtle: #f6f8fa;
            --color-border: #d0d7de;
            --color-border-light: #e8ecf0;
            --radius: 6px;
            --max-width: 860px;
        }
        body { max-width: var(--max-width); margin: 12px auto 40px; padding: 0 20px; font-family: var(--font-sans); color: var(--color-text); background-color: var(--color-bg); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--color-border-light); }
        .breadcrumb { font-size: 0.85em; color: var(--color-text-secondary); }
        .breadcrumb a { color: var(--color-text-secondary); text-decoration: none; }
        .breadcrumb a:hover { color: var(--color-link); text-decoration: underline; }
        .breadcrumb .separator { margin: 0 4px; color: var(--color-border); }
        .breadcrumb .current { color: var(--color-text); font-weight: 600; }
        .content { padding: 64px 16px; text-align: center; }
        .status { font-size: 4em; font-weight: 200; color: var(--color-border); margin: 0; line-height: 1; }
        .message { font-size: 1.1em; color: var(--color-text-secondary); margin: 16px 0 0; }
        .path { font-family: var(--font-mono); font-size: 0.85em; color: var(--color-text-secondary); margin: 8px 0 0; word-break: break-all; }
        .back-link { display: inline-block; margin-top: 24px; color: var(--color-link); text-decoration: none; font-size: 0.9em; }
        .back-link:hover { text-decoration: underline; }
        footer { margin-top: 40px; padding-top: 8px; border-top: 1px solid var(--color-border-light); font-size: 0.75em; color: var(--color-text-secondary); }
{{template "theme-vars-dark"}}
{{template "theme-toggle-css"}}
    </style>
{{template "theme-init"}}
</head>
<body>
    <div class="top-bar">
        <nav class="breadcrumb" data-parent-href="{{.ParentHref}}">{{range $i, $seg := .Breadcrumbs}}{{if $i}}<span class="separator">/</span>{{end}}{{if $seg.Href}}<a href="{{$seg.Href}}">{{$seg.Name}}</a>{{else}}<span class="current">{{$seg.Name}}</span>{{end}}{{end}}</nav>
        <div>{{template "theme-toggle"}}</div>
    </div>
    <div class="content">
        <p class="status">404</p>
        <p class="message">This path doesn't exist.</p>
        <p class="path">/{{.Path}}</p>
        <a class="back-link" href="{{.ParentHref}}">Go back</a>
    </div>
    <footer>viewmd {{.Version}}</footer>
    <script>
    document.addEventListener('keydown', function(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (e.key === 'ArrowLeft' || e.key === 'Backspace') {
            var bc = document.querySelector('.breadcrumb');
            var href = bc ? bc.getAttribute('data-parent-href') : null;
            if (href) {
                e.preventDefault();
                var path = window.location.pathname.replace(/\/+$/, '');
                var name = path.split('/').pop() || '';
                var u = new URL(href, window.location.origin);
                u.searchParams.set('from', name);
                window.location.href = u.toString();
            }
        }
    });
    </script>
</body>
</html>
