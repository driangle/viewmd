<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <base href="{{.BaseURL}}">
    <title>{{.FileName}}</title>
    <style>
        body { max-width: 800px; margin: 40px auto; padding: 0 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; line-height: 1.6; color: #333; }
        pre { background: #f4f4f4; border: 1px solid #ddd; border-radius: 4px; padding: 12px; overflow-x: auto; }
        code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; font-family: 'Courier New', monospace; }
        pre code { background: none; padding: 0; }
        table { border-collapse: collapse; width: 100%; margin: 20px 0; }
        th, td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
        th { background: #f4f4f4; }
        a { color: #0066cc; text-decoration: none; }
        a:hover { text-decoration: underline; }
        blockquote { border-left: 4px solid #ddd; margin: 0; padding-left: 20px; color: #666; }
        img { max-width: 100%; height: auto; }
        .frontmatter { background: #f8f9fa; border: 1px solid #e1e4e8; border-radius: 6px; padding: 4px 12px; margin-bottom: 24px; font-size: 0.85em; color: #586069; }
        .frontmatter table { width: auto; margin: 8px 0; border: none; }
        .frontmatter td { border: none; padding: 2px 12px 2px 0; }
        .frontmatter .fm-key { font-weight: 600; color: #444; }
        .parent-nav { font-size: 0.85em; margin-bottom: 12px; }
        .parent-nav a { color: #586069; }
        .parent-nav a:hover { color: #0066cc; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .copy-btn { background: #f4f4f4; border: 1px solid #ddd; border-radius: 4px; padding: 4px 10px; font-size: 0.8em; cursor: pointer; color: #586069; font-family: inherit; }
        .copy-btn:hover { background: #e8e8e8; color: #333; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="parent-nav"><a href="{{.ParentHref}}">..</a></div>
        <button class="copy-btn" onclick="copyRaw(this)">Copy</button>
    </div>
    {{if .Frontmatter}}<div class="frontmatter"><table>{{range .FrontmatterRows}}<tr><td class="fm-key">{{.Key}}</td><td>{{.Value}}</td></tr>
{{end}}</table></div>
{{end}}{{.BodyHTML}}
    <textarea id="raw-content" style="display:none;">{{.RawContent}}</textarea>
    <script>
    function copyRaw(btn) {
        var text = document.getElementById('raw-content').value;
        navigator.clipboard.writeText(text).then(function() {
            btn.textContent = 'Copied!';
            setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
        });
    }
    </script>
    <footer style="margin-top:40px;padding-top:8px;border-top:1px solid #eee;font-size:0.75em;color:#999;">viewmd {{.Version}}</footer>
    <script>
    document.addEventListener('keydown', function(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (e.key === 'ArrowLeft' || e.key === 'Backspace') {
            var nav = document.querySelector('.parent-nav a');
            if (nav) { e.preventDefault(); window.location.href = nav.href; }
        }
    });
    </script>
</body>
</html>
