<!DOCTYPE html>
<html data-theme="{{.Theme}}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{.DisplayPath}}</title>
    <style>
        :root {
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'SF Mono', Monaco, 'Cascadia Code', 'Courier New', monospace;
            --color-text: #24292f;
            --color-text-secondary: #656d76;
            --color-link: #0969da;
            --color-bg: #ffffff;
            --color-bg-subtle: #f6f8fa;
            --color-border: #d0d7de;
            --color-border-light: #e8ecf0;
            --color-accent-bg: #ddf4ff;
            --color-accent-text: #0550ae;
            --radius: 6px;
            --max-width: 860px;
        }
        body { max-width: var(--max-width); margin: 12px auto 40px; padding: 0 20px; font-family: var(--font-sans); color: var(--color-text); background-color: var(--color-bg); }
        ul { list-style: none; padding: 0; margin: 0; }
        li { margin: 0; }
        li a { display: block; padding: 6px 10px; border-radius: var(--radius); text-decoration: none; color: var(--color-link); transition: background 0.1s; }
        li a:hover { background: var(--color-bg-subtle); }
        li a.dir::before { content: '📁 '; }
        li a.file::before { content: '📄 '; }
        li.kb-active { background: var(--color-accent-bg); border-radius: var(--radius); }
        li.kb-active a { color: var(--color-accent-text); font-weight: 600; }
        .kb-hint { margin-top: 24px; font-size: 0.75em; color: var(--color-text-secondary); letter-spacing: 0.01em; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--color-border-light); }
        .breadcrumb { font-size: 0.85em; color: var(--color-text-secondary); }
        .breadcrumb a { color: var(--color-text-secondary); text-decoration: none; }
        .breadcrumb a:hover { color: var(--color-link); text-decoration: underline; }
        .breadcrumb .separator { margin: 0 4px; color: var(--color-border); }
        .breadcrumb .current { color: var(--color-text); font-weight: 600; }
{{template "theme-vars-dark"}}
{{template "theme-toggle-css"}}
    </style>
</head>
<body>
    <div class="top-bar">
        <nav class="breadcrumb" data-parent-href="{{.ParentHref}}">{{range $i, $seg := .Breadcrumbs}}{{if $i}}<span class="separator">/</span>{{end}}{{if $seg.Href}}<a href="{{$seg.Href}}">{{$seg.Name}}</a>{{else}}<span class="current">{{$seg.Name}}</span>{{end}}{{end}}</nav>
        <div>{{template "theme-toggle"}}</div>
    </div>
{{if .Items}}    <ul id="file-list">
{{range .Items}}<li><a href="{{.Href}}" class="{{.CSSClass}}">{{.Label}}</a></li>
{{end}}    </ul>
    <div class="kb-hint">&#x2191;&#x2193; navigate &middot; Enter/&#x2192; open &middot; &#x2190; back</div>
    <script>
    (function() {
        var items = document.querySelectorAll('#file-list li');
        var idx = -1;
        function highlight(newIdx) {
            if (idx >= 0 && idx < items.length) items[idx].classList.remove('kb-active');
            idx = newIdx;
            if (idx >= 0 && idx < items.length) {
                items[idx].classList.add('kb-active');
                items[idx].scrollIntoView({block: 'nearest'});
            }
        }
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            if (e.key === 'ArrowLeft' || e.key === 'Backspace') {
                var bc = document.querySelector('.breadcrumb');
                var href = bc ? bc.getAttribute('data-parent-href') : null;
                if (href) { e.preventDefault(); window.location.href = href; }
                return;
            }
            if (!items.length) return;
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                highlight(idx < items.length - 1 ? idx + 1 : 0);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                highlight(idx > 0 ? idx - 1 : items.length - 1);
            } else if ((e.key === 'Enter' || e.key === 'ArrowRight') && idx >= 0) {
                e.preventDefault();
                var link = items[idx].querySelector('a');
                if (link) window.location.href = link.href;
            }
        });
    })();
    </script>
{{end}}
</body>
</html>
