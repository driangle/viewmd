<!DOCTYPE html>
<html data-theme="{{.Theme}}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{.FileName}}</title>
    <style>
        :root {
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'SF Mono', Monaco, 'Cascadia Code', 'Courier New', monospace;
            --color-text: #24292f;
            --color-text-secondary: #656d76;
            --color-link: #0969da;
            --color-bg: #ffffff;
            --color-bg-subtle: #f6f8fa;
            --color-border: #d0d7de;
            --color-border-light: #e8ecf0;
            --color-accent-bg: #ddf4ff;
            --color-accent-text: #0550ae;
            --radius: 6px;
            --max-width: 860px;
        }
        body { max-width: var(--max-width); margin: 12px auto 40px; padding: 0 20px; font-family: var(--font-sans); line-height: 1.6; color: var(--color-text); background-color: var(--color-bg); }
        h1, h2, h3, h4, h5, h6 { margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 600; }
        h1 { padding-bottom: 0.3em; border-bottom: 1px solid var(--color-border-light); }
        pre { background: var(--color-bg-subtle); border: 1px solid var(--color-border-light); border-radius: var(--radius); padding: 16px; overflow-x: auto; font-size: 0.85em; line-height: 1.5; }
        code { background: var(--color-bg-subtle); padding: 2px 6px; border-radius: 3px; font-family: var(--font-mono); font-size: 0.85em; }
        pre code { background: none; padding: 0; font-size: inherit; }
        table { border-collapse: collapse; width: 100%; margin: 20px 0; }
        th, td { border: 1px solid var(--color-border); padding: 8px 12px; text-align: left; }
        th { background: var(--color-bg-subtle); font-weight: 600; }
        tr:nth-child(even) { background: var(--color-bg-subtle); }
        a { color: var(--color-link); text-decoration: none; }
        a:hover { text-decoration: underline; }
        blockquote { border-left: 4px solid var(--color-link); margin: 16px 0; padding: 8px 20px; color: var(--color-text-secondary); background: var(--color-bg-subtle); border-radius: 0 var(--radius) var(--radius) 0; }
        img { max-width: 100%; height: auto; }
        hr { border: none; border-top: 1px solid var(--color-border-light); margin: 24px 0; }
        .frontmatter { border-left: 3px solid var(--color-link); background: var(--color-bg-subtle); border-radius: 0 var(--radius) var(--radius) 0; padding: 4px 16px; margin-bottom: 24px; font-size: 0.85em; color: var(--color-text-secondary); }
        .frontmatter table { width: auto; margin: 8px 0; border: none; background: none; }
        .frontmatter td { border: none; padding: 2px 12px 2px 0; background: none; }
        .frontmatter .fm-key { font-weight: 600; color: var(--color-text); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--color-border-light); }
        .top-bar .title { font-size: 0.85em; color: var(--color-text-secondary); font-weight: 600; }
{{template "theme-vars-dark"}}
{{template "theme-toggle-css"}}
    </style>
</head>
<body>
    <div class="top-bar">
        <span class="title">{{.FileName}}</span>
        <div>{{template "theme-toggle"}}</div>
    </div>
    {{if .FrontmatterRows}}<div class="frontmatter"><table>{{range .FrontmatterRows}}<tr><td class="fm-key">{{.Key}}</td><td>{{.Value}}</td></tr>
{{end}}</table></div>
{{end}}{{.BodyHTML}}
{{if .ParentHref}}    <script>
    document.addEventListener('keydown', function(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (e.key === 'ArrowLeft' || e.key === 'Backspace') {
            e.preventDefault();
            window.location.href = '{{.ParentHref}}';
        }
    });
    </script>
{{end}}
</body>
</html>
