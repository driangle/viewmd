<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{.FileName}}</title>
    <style>
        body { max-width: 1000px; margin: 20px auto; padding: 0 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f6f8fa; }
        .header { background: white; border: 1px solid #d0d7de; border-radius: 6px 6px 0 0; padding: 12px 16px; font-weight: 600; border-bottom: 1px solid #d0d7de; }
        .content { background: white; border: 1px solid #d0d7de; border-top: none; border-radius: 0 0 6px 6px; padding: 16px; overflow-x: auto; }
        pre { margin: 0; font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Mono', 'Courier New', monospace; font-size: 12px; line-height: 1.5; white-space: pre; word-wrap: normal; }
        .parent-nav { font-size: 0.85em; margin-bottom: 8px; }
        .parent-nav a { color: #586069; text-decoration: none; }
        .parent-nav a:hover { color: #0066cc; text-decoration: underline; }
        .header { display: flex; justify-content: space-between; align-items: center; }
        .copy-btn { background: #f4f4f4; border: 1px solid #d0d7de; border-radius: 4px; padding: 4px 10px; font-size: 0.8em; cursor: pointer; color: #586069; font-family: inherit; }
        .copy-btn:hover { background: #e8e8e8; color: #333; }
    </style>
</head>
<body>
    <div class="parent-nav"><a href="{{.ParentHref}}">..</a></div>
    <div class="header"><span>{{.FileName}}</span><button class="copy-btn" onclick="copyRaw(this)">Copy</button></div>
    <div class="content"><pre>{{.Content}}</pre></div>
    <textarea id="raw-content" style="display:none;">{{.RawContent}}</textarea>
    <script>
    function copyRaw(btn) {
        var text = document.getElementById('raw-content').value;
        navigator.clipboard.writeText(text).then(function() {
            btn.textContent = 'Copied!';
            setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
        });
    }
    </script>
    <footer style="margin-top:12px;font-size:0.75em;color:#999;">viewmd {{.Version}}</footer>
</body>
</html>
