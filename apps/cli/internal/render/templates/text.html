<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{.FileName}}</title>
    <style>
        :root {
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'SF Mono', Monaco, 'Cascadia Code', 'Courier New', monospace;
            --color-text: #24292f;
            --color-text-secondary: #656d76;
            --color-link: #0969da;
            --color-bg: #ffffff;
            --color-bg-subtle: #f6f8fa;
            --color-border: #d0d7de;
            --color-border-light: #e8ecf0;
            --color-accent-bg: #ddf4ff;
            --color-accent-text: #0550ae;
            --radius: 6px;
            --max-width: 860px;
        }
        body { max-width: var(--max-width); margin: 40px auto; padding: 0 20px; font-family: var(--font-sans); color: var(--color-text); }
        .breadcrumb { font-size: 0.85em; margin-bottom: 12px; color: var(--color-text-secondary); }
        .breadcrumb a { color: var(--color-text-secondary); text-decoration: none; }
        .breadcrumb a:hover { color: var(--color-link); text-decoration: underline; }
        .breadcrumb .separator { margin: 0 4px; color: var(--color-border); }
        .breadcrumb .current { color: var(--color-text); font-weight: 600; }
        .header { display: flex; justify-content: space-between; align-items: center; background: var(--color-bg-subtle); border: 1px solid var(--color-border); border-radius: var(--radius) var(--radius) 0 0; padding: 10px 16px; font-weight: 600; font-size: 0.9em; }
        .content { background: var(--color-bg); border: 1px solid var(--color-border); border-top: none; border-radius: 0 0 var(--radius) var(--radius); padding: 16px; overflow-x: auto; }
        pre { margin: 0; font-family: var(--font-mono); font-size: 13px; line-height: 1.5; white-space: pre; word-wrap: normal; color: var(--color-text); }
        .copy-btn { background: var(--color-bg); border: 1px solid var(--color-border); border-radius: var(--radius); padding: 4px 12px; font-size: 0.8em; cursor: pointer; color: var(--color-text-secondary); font-family: var(--font-sans); transition: background 0.1s; }
        .copy-btn:hover { background: var(--color-border-light); color: var(--color-text); }
        footer { margin-top: 40px; padding-top: 8px; border-top: 1px solid var(--color-border-light); font-size: 0.75em; color: var(--color-text-secondary); }
    </style>
</head>
<body>
    <nav class="breadcrumb" data-parent-href="{{.ParentHref}}">{{range $i, $seg := .Breadcrumbs}}{{if $i}}<span class="separator">/</span>{{end}}{{if $seg.Href}}<a href="{{$seg.Href}}">{{$seg.Name}}</a>{{else}}<span class="current">{{$seg.Name}}</span>{{end}}{{end}}</nav>
    <div class="header"><span>{{.FileName}}</span><button class="copy-btn" onclick="copyRaw(this)">Copy</button></div>
    <div class="content"><pre>{{.Content}}</pre></div>
    <textarea id="raw-content" style="display:none;">{{.RawContent}}</textarea>
    <script>
    function copyRaw(btn) {
        var text = document.getElementById('raw-content').value;
        navigator.clipboard.writeText(text).then(function() {
            btn.textContent = 'Copied!';
            setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
        });
    }
    </script>
    <footer>viewmd {{.Version}}</footer>
    <script>
    document.addEventListener('keydown', function(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (e.key === 'ArrowLeft' || e.key === 'Backspace') {
            var bc = document.querySelector('.breadcrumb');
            var href = bc ? bc.getAttribute('data-parent-href') : null;
            if (href) { e.preventDefault(); window.location.href = href; }
        }
    });
    </script>
</body>
</html>
