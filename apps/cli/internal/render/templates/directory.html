<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Directory listing</title>
    <style>
        :root {
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'SF Mono', Monaco, 'Cascadia Code', 'Courier New', monospace;
            --color-text: #24292f;
            --color-text-secondary: #656d76;
            --color-link: #0969da;
            --color-bg: #ffffff;
            --color-bg-subtle: #f6f8fa;
            --color-border: #d0d7de;
            --color-border-light: #e8ecf0;
            --color-accent-bg: #ddf4ff;
            --color-accent-text: #0550ae;
            --radius: 6px;
            --max-width: 860px;
        }
        body { max-width: var(--max-width); margin: 40px auto; padding: 0 20px; font-family: var(--font-sans); color: var(--color-text); background-color: var(--color-bg); }
        h1 { font-size: 1.25em; font-weight: 600; color: var(--color-text); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--color-border-light); }
        ul { list-style: none; padding: 0; margin: 0; }
        li { margin: 0; }
        li a { display: block; padding: 6px 10px; border-radius: var(--radius); text-decoration: none; color: var(--color-link); transition: background 0.1s; }
        li a:hover { background: var(--color-bg-subtle); }
        li a.dir::before { content: '📁 '; }
        li a.file::before { content: '📄 '; }
        li.kb-active { background: var(--color-accent-bg); border-radius: var(--radius); }
        li.kb-active a { color: var(--color-accent-text); font-weight: 600; }
        .kb-hint { margin-top: 24px; font-size: 0.75em; color: var(--color-text-secondary); letter-spacing: 0.01em; }
        .breadcrumb { font-size: 0.85em; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--color-border-light); color: var(--color-text-secondary); }
        .breadcrumb a { color: var(--color-text-secondary); text-decoration: none; }
        .breadcrumb a:hover { color: var(--color-link); text-decoration: underline; }
        .breadcrumb .separator { margin: 0 4px; color: var(--color-border); }
        .breadcrumb .current { color: var(--color-text); font-weight: 600; }
        footer { margin-top: 40px; padding-top: 8px; border-top: 1px solid var(--color-border-light); font-size: 0.75em; color: var(--color-text-secondary); }
        .dir-top-bar { display: flex; justify-content: flex-end; margin-bottom: 8px; }
{{template "theme-vars-dark"}}
{{template "theme-toggle-css"}}
    </style>
{{template "theme-init"}}
</head>
<body>
    <div class="dir-top-bar">{{template "theme-toggle"}}</div>
    <nav class="breadcrumb" data-parent-href="{{if .HasParent}}/{{.ParentHref}}{{else}}/{{end}}">{{range $i, $seg := .Breadcrumbs}}{{if $i}}<span class="separator">/</span>{{end}}{{if $seg.Href}}<a href="{{$seg.Href}}">{{$seg.Name}}</a>{{else}}<span class="current">{{$seg.Name}}</span>{{end}}{{end}}</nav>
    <ul id="file-list">
{{range .Items}}<li><a href="/{{.Href}}" class="{{.CSSClass}}">{{.Label}}</a></li>
{{end}}    </ul>
    <div class="kb-hint">&#x2191;&#x2193; navigate &middot; Enter/&#x2192; open &middot; &#x2190; back</div>
    <footer>viewmd {{.Version}}</footer>
    <script>
    (function() {
        var items = document.querySelectorAll('#file-list li');
        if (!items.length) return;
        var idx = -1;
        var params = new URLSearchParams(window.location.search);
        function highlight(newIdx) {
            if (idx >= 0 && idx < items.length) items[idx].classList.remove('kb-active');
            idx = newIdx;
            if (idx >= 0 && idx < items.length) {
                items[idx].classList.add('kb-active');
                items[idx].scrollIntoView({block: 'nearest'});
            }
        }
        function addParam(href, key, val) {
            var u = new URL(href, window.location.origin);
            u.searchParams.set(key, val);
            return u.toString();
        }
        function currentDirName() {
            var path = window.location.pathname.replace(/\/+$/, '');
            var parts = path.split('/');
            return parts[parts.length - 1] || '';
        }
        if (params.has('from')) {
            var from = params.get('from');
            for (var i = 0; i < items.length; i++) {
                var a = items[i].querySelector('a');
                if (a && a.textContent.replace(/\/$/, '') === from) {
                    highlight(i);
                    break;
                }
            }
            if (idx < 0) highlight(0);
        } else if (params.has('kb')) {
            highlight(0);
        }
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                highlight(idx < items.length - 1 ? idx + 1 : 0);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                highlight(idx > 0 ? idx - 1 : items.length - 1);
            } else if (e.key === 'Enter' && idx >= 0) {
                e.preventDefault();
                var link = items[idx].querySelector('a');
                if (link) window.location.href = addParam(link.href, 'kb', '1');
            } else if (e.key === 'ArrowRight' && idx >= 0) {
                var link = items[idx].querySelector('a');
                if (link && !link.hasAttribute('data-parent')) {
                    e.preventDefault();
                    window.location.href = addParam(link.href, 'kb', '1');
                }
            } else if (e.key === 'ArrowLeft' || e.key === 'Backspace') {
                var bc = document.querySelector('.breadcrumb');
                var href = bc ? bc.getAttribute('data-parent-href') : null;
                if (href) {
                    e.preventDefault();
                    window.location.href = addParam(href, 'from', currentDirName());
                }
            }
        });
    })();
    </script>
</body>
</html>
