<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Directory listing</title>
    <style>
        body { max-width: 800px; margin: 40px auto; padding: 0 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        ul { list-style: none; padding: 0; }
        li { margin: 8px 0; }
        a { text-decoration: none; color: #0066cc; }
        a:hover { text-decoration: underline; }
        li.kb-active { background: #e8f0fe; border-radius: 4px; padding: 2px 6px; margin-left: -6px; }
        li.kb-active a { color: #1a4d99; font-weight: 600; }
        .kb-hint { margin-top: 24px; font-size: 0.75em; color: #999; }
    </style>
</head>
<body>
    <h1>Directory: /{{.DisplayPath}}</h1>
    <ul id="file-list">
{{if .HasParent}}<li><a href="/{{.ParentHref}}" class="dir" data-parent>..</a></li>
{{end}}{{range .Items}}<li><a href="/{{.Href}}" class="{{.CSSClass}}">{{.Label}}</a></li>
{{end}}    </ul>
    <div class="kb-hint">&#x2191;&#x2193; navigate &middot; Enter/&#x2192; open &middot; &#x2190; back</div>
    <footer style="margin-top:40px;padding-top:8px;border-top:1px solid #eee;font-size:0.75em;color:#999;">viewmd {{.Version}}</footer>
    <script>
    (function() {
        var items = document.querySelectorAll('#file-list li');
        if (!items.length) return;
        var idx = -1;
        function highlight(newIdx) {
            if (idx >= 0 && idx < items.length) items[idx].classList.remove('kb-active');
            idx = newIdx;
            if (idx >= 0 && idx < items.length) {
                items[idx].classList.add('kb-active');
                items[idx].scrollIntoView({block: 'nearest'});
            }
        }
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                highlight(idx < items.length - 1 ? idx + 1 : 0);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                highlight(idx > 0 ? idx - 1 : items.length - 1);
            } else if (e.key === 'Enter' && idx >= 0) {
                e.preventDefault();
                var link = items[idx].querySelector('a');
                if (link) window.location.href = link.href;
            } else if (e.key === 'ArrowRight' && idx >= 0) {
                var link = items[idx].querySelector('a');
                if (link && !link.hasAttribute('data-parent')) {
                    e.preventDefault();
                    window.location.href = link.href;
                }
            } else if ((e.key === 'ArrowLeft' || e.key === 'Backspace') && idx < 0) {
                var parentLink = document.querySelector('#file-list li:first-child a[data-parent]');
                if (parentLink) {
                    e.preventDefault();
                    window.location.href = parentLink.href;
                }
            }
        });
    })();
    </script>
</body>
</html>
