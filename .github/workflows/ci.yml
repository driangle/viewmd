name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/cli/go.mod
      - name: Vet
        run: go vet ./...
        working-directory: apps/cli
      - name: Test
        run: go test ./...
        working-directory: apps/cli
